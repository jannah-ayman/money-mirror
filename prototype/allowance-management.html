<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Allowance Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 pb-20">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="parent-dashboard.html" class="text-blue-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">Allowance Management</h2>
        </header>

        <!-- Allowance Sections -->
        <section class="space-y-6">
            <!-- Current Allowance -->
            <div class="bg-green-50 p-4 rounded-xl border-2 border-green-200">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">💰</span>
                    Current Allowance
                </h3>
                <div class="text-center">
                    <div class="text-3xl font-bold text-green-600">$10.00</div>
                    <div class="text-sm text-gray-600">per week</div>
                </div>
            </div>

            <!-- Set New Allowance -->
            <div class="bg-white p-4 rounded-xl border-2 border-gray-100">
                <h3 class="font-semibold mb-3">Set New Allowance</h3>
                <form class="space-y-4" action="parent-dashboard.html" method="get">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" for="allowance-amount">Amount
                            ($)</label>
                        <input type="number" id="allowance-amount" name="allowance-amount" value="10"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                            required min="0" step="0.01">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" for="frequency">Frequency</label>
                        <select id="frequency" name="frequency"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition-colors">
                        Update Allowance
                    </button>
                </form>
            </div>

            <!-- Add Bonus -->
            <div class="bg-yellow-50 p-4 rounded-xl border-2 border-yellow-200">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">🎁</span>
                    Add Bonus
                </h3>
                <form class="space-y-3" action="parent-dashboard.html" method="get">
                    <input type="number" id="bonus-amount" name="bonus-amount" placeholder="Bonus amount"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                        required min="0" step="0.01">
                    <input type="text" id="bonus-reason" name="bonus-reason" placeholder="Reason (e.g., good grades)"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                    <button type="submit"
                        class="w-full bg-yellow-500 text-white py-3 rounded-xl font-semibold hover:bg-yellow-600 transition-colors">
                        Give Bonus! 🎉
                    </button>
                </form>
            </div>

            <!-- Recent History -->
            <div class="bg-white p-4 rounded-xl border-2 border-gray-100">
                <h3 class="font-semibold mb-3">Recent History</h3>
                <div class="space-y-2">
                    <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                        <span class="text-sm">Weekly Allowance</span>
                        <div class="text-right">
                            <div class="text-green-600 font-semibold">+$10.00</div>
                            <div class="text-xs text-gray-500">Dec 18</div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                        <span class="text-sm">Good Grades Bonus</span>
                        <div class="text-right">
                            <div class="text-green-600 font-semibold">+$5.00</div>
                            <div class="text-xs text-gray-500">Dec 15</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-sm bg-white border-t-2 border-gray-100">
            <div class="flex justify-around py-3">
                <a href="parent-dashboard.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏠</span>
                    <span class="text-xs">Home</span>
                </a>
                <!-- <a href="statistics.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📈</span>
                    <span class="text-xs">Stats</span>
                </a> -->
                <a href="parent-expenses.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📊</span>
                    <span class="text-xs">Expenses</span>
                </a>
                <a href="profile-analysis.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🤖</span>
                    <span class="text-xs">Analysis</span>
                </a>
                <a href="reports.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📋</span>
                    <span class="text-xs">Reports</span>
                </a>
                <a href="parent-profile.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">👤</span>
                    <span class="text-xs">Profile</span>
                </a>
            </div>
        </nav>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
