<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Child Expenses</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 pb-20">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="child-dashboard.html" class="text-gray-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">Add What You Bought</h2>
        </header>

        <!-- Expense Form Content -->
        <section class="space-y-6">
            <!-- Header Banner -->
            <div class="text-center">
                <div class="text-6xl mb-2 mascot" id="expense-mascot">😼</div>
                <p class="text-gray-600">Tell me what you bought!</p>
            </div>

            <!-- Expense Form -->
            <div class="bg-white p-4 rounded-xl border-2 border-gray-200">
                <form class="space-y-4" action="child-dashboard.html" method="get">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" for="expense-amount">How much did it
                            cost? 💰</label>
                        <input type="number" id="expense-amount" name="expense-amount" step="0.01" placeholder="0.00"
                            class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none text-2xl text-center font-bold"
                            required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">What did you buy? 🛍️</label>
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="toys">
                                <div class="text-3xl mb-1">🧸</div>
                                <div class="text-xs">Toys</div>
                            </button>
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="food">
                                <div class="text-3xl mb-1">🍭</div>
                                <div class="text-xs">Snacks</div>
                            </button>
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="books">
                                <div class="text-3xl mb-1">📚</div>
                                <div class="text-xs">Books</div>
                            </button>
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="games">
                                <div class="text-3xl mb-1">🎮</div>
                                <div class="text-xs">Games</div>
                            </button>
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="clothes">
                                <div class="text-3xl mb-1">👕</div>
                                <div class="text-xs">Clothes</div>
                            </button>
                            <button type="button"
                                class="category-btn p-4 bg-gray-100 rounded-xl text-center hover:bg-blue-100 focus:bg-blue-200"
                                data-category="other">
                                <div class="text-3xl mb-1">❓</div>
                                <div class="text-xs">Other</div>
                            </button>
                        </div>
                        <input type="text" id="expense-description" name="expense-description"
                            placeholder="Anything else you want to mention?"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">How did you feel? 😊</label>
                        <div class="grid grid-cols-5 gap-2">
                            <button type="button"
                                class="mood-btn p-3 bg-gray-100 rounded-xl text-center hover:bg-yellow-100 focus:bg-yellow-200"
                                data-mood="happy">
                                <div class="text-3xl">😊</div>
                                <div class="text-xs">Happy</div>
                            </button>
                            <button type="button"
                                class="mood-btn p-3 bg-gray-100 rounded-xl text-center hover:bg-yellow-100 focus:bg-yellow-200"
                                data-mood="excited">
                                <div class="text-3xl">😋</div>
                                <div class="text-xs">Excited</div>
                            </button>
                            <button type="button"
                                class="mood-btn p-3 bg-gray-100 rounded-xl text-center hover:bg-yellow-100 focus:bg-yellow-200"
                                data-mood="neutral">
                                <div class="text-3xl">😐</div>
                                <div class="text-xs">Okay</div>
                            </button>
                            <button type="button"
                                class="mood-btn p-3 bg-gray-100 rounded-xl text-center hover:bg-yellow-100 focus:bg-yellow-200"
                                data-mood="sad">
                                <div class="text-3xl">😢</div>
                                <div class="text-xs">Sad</div>
                            </button>
                            <button type="button"
                                class="mood-btn p-3 bg-gray-100 rounded-xl text-center hover:bg-yellow-100 focus:bg-yellow-200"
                                data-mood="worried">
                                <div class="text-3xl">😰</div>
                                <div class="text-xs">Worried</div>
                            </button>
                        </div>
                    </div>
                    <button type="submit" onclick="saveExpense()"
                        class="w-full bg-green-500 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-green-600 transition-colors">
                        Save My Purchase! 🎉
                    </button>
                </form>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-sm bg-white border-t-2 border-gray-100">
            <div class="flex justify-around py-3">
                <a href="child-dashboard.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏠</span>
                    <span class="text-xs">Home</span>
                </a>
                <a href="child-expense-history.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📋</span>
                    <span class="text-xs">History</span>
                </a>
                <a href="child-story-quiz.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📚</span>
                    <span class="text-xs">Quiz</span>
                </a>
                <a href="child-achievements.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏆</span>
                    <span class="text-xs">Badges</span>
                </a>
                <a href="child-profile.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl child-mascot">🐻</span>
                    <span class="text-xs">Profile</span>
                </a>
            </div>
        </nav>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
