<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Parent Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 text-center">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="index.html" class="text-blue-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">Parent Login</h2>
        </header>

        <!-- Login Content -->
        <section class="mt-12 mb-8">
            <div class="text-6xl mb-4">👨‍👩‍👧‍👦</div>
            <h3 class="text-xl font-bold text-blue-600">Welcome Back!</h3>
            <p class="text-gray-600 mt-2">Sign in to monitor your child's progress</p>
        </section>

        <!-- Login Form -->
        <form action="parent-dashboard.html" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2" for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email"
                    class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2" for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password"
                    class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center">
                    <input type="checkbox" id="remember-me" name="remember-me" class="mr-2">
                    <span class="text-gray-600">Remember me</span>
                </label>
                <a href="#" class="text-blue-500 hover:text-blue-600 transition-colors">Forgot password?</a>
            </div>
            <button type="submit"
                class="w-full bg-blue-500 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-blue-600 transition-colors">
                Sign In 🔐
            </button>
        </form>

        <!-- Signup Link -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Don't have an account?</p>
            <a href="parent-signup.html" class="text-blue-500 font-medium hover:text-blue-600 transition-colors">Sign up
                here</a>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
