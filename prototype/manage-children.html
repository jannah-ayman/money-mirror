<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Manage Children</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 pb-20">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="parent-dashboard.html" class="text-blue-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">Manage Children</h2>
        </header>

        <!-- Children List Content -->
        <section class="space-y-6">
            <div class="bg-white p-4 rounded-xl border-2 border-gray-100">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">👨‍👩‍👧‍👦</span>
                    Your Children
                </h3>
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-3 bg-green-50 rounded-xl border border-green-200">
                        <div class="flex items-center">
                            <span class="text-2xl mr-3">👧</span>
                            <div>
                                <div class="font-medium">Emma Johnson</div>
                                <div class="text-sm text-gray-500">Age: 8 • Active since Dec 1</div>
                                <div class="text-sm text-green-600">Code: EMM2024</div>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editChild('emma')"
                                class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-600 transition-colors">
                                Edit
                            </button>
                            <button onclick="confirmDeleteChild('emma')"
                                class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600 transition-colors">
                                Delete
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-blue-50 rounded-xl border border-blue-200">
                        <div class="flex items-center">
                            <span class="text-2xl mr-3">👦</span>
                            <div>
                                <div class="font-medium">Jake Johnson</div>
                                <div class="text-sm text-gray-500">Age: 12 • Inactive</div>
                                <div class="text-sm text-blue-600">Code: JAK2024</div>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editChild('jake')"
                                class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-600 transition-colors">
                                Edit
                            </button>
                            <button onclick="confirmDeleteChild('jake')"
                                class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600 transition-colors">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
                <div class="mt-4 space-y-4">
                    <a href="initial-profiling.html"
                        class="w-full block bg-green-500 text-white py-3 rounded-xl font-semibold text-center hover:bg-green-600 transition-colors">
                        ➕ Add New Child
                    </a>
                    <div class="text-center text-gray-500 font-medium">OR</div>
                    <div class="space-y-3">
                        <input type="text" id="childCodeInput" name="child-code" placeholder="Enter child code"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none text-center font-mono">
                        <button onclick="addChildByCode()"
                            class="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition-colors">
                            🔢 Add by Code
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
