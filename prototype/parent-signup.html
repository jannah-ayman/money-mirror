<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Parent Sign Up</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="index.html" class="text-blue-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">Parent Sign Up</h2>
        </header>

        <!-- Sign Up Form -->
        <form class="space-y-4" action="parent-dashboard.html" method="get">
            <!-- Name Fields -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                </div>
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2" for="email">Email</label>
                <input type="email" id="email" name="email"
                    class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <!-- Phone Number Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone"
                    class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <!-- Date of Birth and Role Fields -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="role">Role</label>
                    <select id="role" name="role"
                        class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
                        <option value="mom">Mom</option>
                        <option value="dad">Dad</option>
                        <option value="caretaker">Caretaker</option>
                        <option value="guardian">Guardian</option>
                    </select>
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2" for="password">Password</label>
                <input type="password" id="password" name="password"
                    class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none">
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-blue-500 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-blue-600 transition-colors">
                Create Account 🎉
            </button>
        </form>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
