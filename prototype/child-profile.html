<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Child Profile</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 pb-20">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="child-dashboard.html" class="text-purple-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">My Profile</h2>
        </header>

        <!-- Profile Content -->
        <section class="space-y-6">
            <!-- Profile Header -->
            <div class="text-center">
                <div class="text-8xl mb-4 child-mascot" id="profile-mascot">🧑‍🚀</div>
                <button onclick="showAvatarSelector()"
                    class="bg-purple-500 text-white px-4 py-2 rounded-xl text-sm font-medium mb-4 hover:bg-purple-600 transition-colors">
                    Change Avatar ✨
                </button>
                <h3 class="text-2xl font-bold text-purple-600">Emma the Smart Spender!</h3>
                <p class="text-gray-600 mt-2">You're learning to be great with money! 🌟</p>
            </div>

            <!-- Avatar Selector -->
            <div id="avatar-selector" class="hidden bg-white p-4 rounded-xl border-2 border-purple-200">
                <h3 class="font-semibold mb-3 text-center">Choose Your Avatar!</h3>
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="selectAvatar('🧑‍🚀')"
                        class="avatar-option text-4xl p-3 bg-gray-100 rounded-xl hover:bg-purple-100 transition-colors">
                        🧑‍🚀
                    </button>
                    <button onclick="selectAvatar('⭐')"
                        class="avatar-option text-4xl p-3 bg-gray-100 rounded-xl hover:bg-purple-100 transition-colors">
                        ⭐
                    </button>
                    <button onclick="selectAvatar('🌛')"
                        class="avatar-option text-4xl p-3 bg-gray-100 rounded-xl hover:bg-purple-100 transition-colors">
                        🌛
                    </button>
                    <button onclick="selectAvatar('🌞')"
                        class="avatar-option text-4xl p-3 bg-gray-100 rounded-xl hover:bg-purple-100 transition-colors">
                        🌞
                    </button>
                </div>
                <button onclick="hideAvatarSelector()"
                    class="w-full bg-gray-300 text-gray-700 py-2 rounded-xl font-medium mt-3 hover:bg-gray-400 transition-colors">
                    Cancel
                </button>
            </div>



            <!-- Fun Facts Section -->
            <!-- <div class="bg-purple-50 p-4 rounded-xl border-2 border-purple-200">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">🔍</span>
                    Fun Facts About Your Spending!
                </h3>
                <div class="space-y-2">
                    <div class="bg-white p-3 rounded-lg">
                        <div class="text-sm">🧸 Your favorite thing to buy is <strong>toys</strong>!</div>
                    </div>
                    <div class="bg-white p-3 rounded-lg">
                        <div class="text-sm">😊 You spend the most when you're <strong>happy</strong>!</div>
                    </div>
                    <div class="bg-white p-3 rounded-lg">
                        <div class="text-sm">📅 You like shopping on <strong>weekends</strong>!</div>
                    </div>
                </div>
            </div> -->
            <!-- Logout Button -->
            <div class="flex justify-center">
                <a href="index.html"
                    class="block w-1/2 bg-red-100 text-gray-700 py-3 rounded-xl font-medium text-center px-4 hover:bg-red-200 transition-colors border-2 border-red-200">
                    👋 Log Out
                </a>
            </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-sm bg-white border-t-2 border-gray-100">
            <div class="flex justify-around py-3">
                <a href="child-dashboard.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏠</span>
                    <span class="text-xs">Home</span>
                </a>
                <a href="child-expense-history.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📋</span>
                    <span class="text-xs">History</span>
                </a>
                <a href="child-story-quiz.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📚</span>
                    <span class="text-xs">Quiz</span>
                </a>
                <a href="child-achievements.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏆</span>
                    <span class="text-xs">Badges</span>
                </a>
                <a href="child-profile.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl child-mascot">🧑‍🚀</span>
                    <span class="text-xs">Profile</span>
                </a>
            </div>
        </nav>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
