<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mirror - Parent Profile</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">
    <!-- Main Container -->
    <main class="max-w-sm mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden p-6 pb-20">
        <!-- Header Section -->
        <header class="flex items-center mb-6">
            <a href="parent-dashboard.html" class="text-blue-500 text-2xl">←</a>
            <h2 class="text-xl font-bold text-center flex-1">My Profile</h2>
        </header>

        <!-- Profile Content -->
        <section class="space-y-6">
            <!-- Parent Profile -->
            <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">👤</span>
                    Your Profile
                </h3>
                <form class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" for="first-name">First
                                Name</label>
                            <input type="text" id="first-name" name="first-name" value="Sarah"
                                class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" for="last-name">Last
                                Name</label>
                            <input type="text" id="last-name" name="last-name" value="Johnson"
                                class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" for="email">Email</label>
                        <input type="email" id="email" name="email" value="sarah.johnson@email.com"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                            required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" value="+1 (555) 123-4567"
                            class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                            required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" for="dob">Date of Birth</label>
                            <input type="date" id="dob" name="dob" value="1985-03-15"
                                class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" for="role">Role</label>
                            <select id="role" name="role"
                                class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                required>
                                <option value="mom" selected>Mom</option>
                                <option value="dad">Dad</option>
                                <option value="caretaker">Caretaker</option>
                                <option value="guardian">Guardian</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition-colors">
                        Update Profile
                    </button>
                </form>
            </div>

            <!-- Account Settings -->
            <div class="bg-white p-4 rounded-xl border-2 border-gray-100">
                <h3 class="font-semibold mb-3 flex items-center">
                    <span class="text-xl mr-2">⚙️</span>
                    Account Settings
                </h3>
                <div class="space-y-3">
                    <button
                        class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-medium text-left px-4 hover:bg-gray-200 transition-colors">
                        🔔 Notification Settings
                    </button>
                    <button
                        class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-medium text-left px-4 hover:bg-gray-200 transition-colors">
                        🔒 Privacy Settings
                    </button>
                    <button
                        class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-medium text-left px-4 hover:bg-gray-200 transition-colors">
                        📱 Export Data
                    </button>
                    <a href="index.html"
                        class="block w-full bg-blue-100 text-gray-700 py-3 rounded-xl font-medium text-left px-4 hover:bg-blue-200 transition-colors border-2 border-blue-200">
                        👋 Log Out
                    </a>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="bg-red-50 p-4 rounded-xl border-2 border-red-200">
                <h3 class="font-semibold mb-3 flex items-center text-red-700">
                    <span class="text-xl mr-2">⚠️</span>
                    Danger Zone
                </h3>
                <div class="space-y-2">
                    <button onclick="confirmDeleteAccount()"
                        class="w-full bg-red-500 text-white py-3 rounded-xl font-semibold hover:bg-red-600 transition-colors">
                        Delete Account
                    </button>
                    <p class="text-xs text-red-600 text-center">This action cannot be undone</p>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav
            class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-sm bg-white border-t-2 border-gray-100">
            <div class="flex justify-around py-3">
                <a href="parent-dashboard.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🏠</span>
                    <span class="text-xs">Home</span>
                </a>
                <!-- <a href="statistics.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📈</span>
                    <span class="text-xs">Stats</span>
                </a> -->
                <a href="parent-expenses.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📊</span>
                    <span class="text-xs">Expenses</span>
                </a>
                <a href="profile-analysis.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">🤖</span>
                    <span class="text-xs">Analysis</span>
                </a>
                <a href="reports.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">📋</span>
                    <span class="text-xs">Reports</span>
                </a>
                <a href="parent-profile.html"
                    class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="text-xl">👤</span>
                    <span class="text-xs">Profile</span>
                </a>
            </div>
        </nav>
    </main>

    <!-- JavaScript -->
    <script src="apps/app.js"></script>
</body>

</html>
